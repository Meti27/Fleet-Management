spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fleetdb}
spring.datasource.username=${DB_USER:fleet_user}
spring.datasource.password=${DB_PASS:Random0027}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

security.jwt.secret=${SECURITY.JWT_SECRET}

security.jwt.exp-minutes=120
