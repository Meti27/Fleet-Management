server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JWT ---
security.jwt.secret=${SECURITY.JWT_SECRET}
security.jwt.exp-minutes=${SECURITY.JWT_EXP_MINUTES:120}

# --- Production Rules ---
# Schema is managed by Flyway; Hibernate only validates (see base application.properties).
# On the existing prod database, baseline-on-migrate marks V1 as already applied
# and runs later migrations (V2+) on top.